services:
  app1:
    image: nginx
    container_name: app1
    ports:
      - "8080:80"
    volumes:
      - ./app1:/usr/share/nginx/html
                            
  app2:
    image: nginx
    container_name: app2
    ports:
      - "8081:80"
    volumes:
      - ./app2:/usr/share/nginx/html

  proxy:
    image: nginx
    container_name: proxy
    ports:
      - "80:80"
    volumes:
      - ./proxy/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - app1
      - app2
