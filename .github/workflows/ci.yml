name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  validate:
    runs-on: ubuntu-latest
                                                                              
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: install Docker
        run: |
          sudo apt-get update
          sudo apt-get install -y docker.io
          docker --version

      - name: Check required files exist
        run: |
          test -f docker-compose.yml
          test -f proxy/nginx.conf
          test -f app1/index.html
          test -f app2/index.html



      - name: Validate Docker Compose
        run: docker compose -f docker-compose.yml config



      - name: Validate NGINX config
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/proxy/nginx.conf:/etc/nginx/nginx.conf:ro \
            nginx:latest nginx -t
